# 构建 Drawnix Store 的外部产物并发布三个最小运行镜像，部署主机无需持有源码和 Node 工具链。
name: 发布 Drawnix Store 镜像

on:
  push:
    branches:
      - develop
      # 兼容不同仓库的默认分支命名；仅 GitHub 实际默认分支会更新 latest 标签。
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/drawnixstore

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 构建 Drawnix Store 运行产物
        run: npm run build:drawnix-store-images

      - uses: docker/setup-buildx-action@v4

      - uses: docker/setup-qemu-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 生成 Web 镜像标签
        id: web-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-web
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 发布 Web 镜像
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/drawnixstore-web/dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.web-meta.outputs.tags }}
          labels: ${{ steps.web-meta.outputs.labels }}

      - name: 生成 API 镜像标签
        id: api-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-api
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 发布 API 镜像
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/drawnixstore-api/dockerfile
          target: runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.api-meta.outputs.tags }}
          labels: ${{ steps.api-meta.outputs.labels }}

      - name: 生成 bootstrap 镜像标签
        id: bootstrap-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-bootstrap
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 发布 bootstrap 镜像
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/drawnixstore-api/dockerfile
          target: bootstrap
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.bootstrap-meta.outputs.tags }}
          labels: ${{ steps.bootstrap-meta.outputs.labels }}
