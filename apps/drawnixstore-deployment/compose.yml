# Drawnix Store 生产编排：生产环境通过外部 HTTPS 反向代理访问；受控 HTTP 仅限局域网调试。PocketBase 与 API 始终留在私有网络。
services:
  pocketbase-init:
    # 固定已验证的 PocketBase 版本，升级前必须完成 Schema 与端到端兼容性验证。
    image: ghcr.io/muchobien/pocketbase:0.39.8
    entrypoint: ["pocketbase"]
    command: ["superuser", "upsert", "${NITRO_POCKETBASE_SUPERUSER_EMAIL:?请设置 PocketBase 管理员邮箱}", "${NITRO_POCKETBASE_SUPERUSER_PASSWORD:?请设置 PocketBase 管理员密码}", "--dir", "/pb_data", "--encryptionEnv", "ENCRYPTION"]
    environment:
      ENCRYPTION: ${POCKETBASE_ENCRYPTION:?请设置 PocketBase 数据加密密钥}
    volumes:
      - drawnixstore-pocketbase-data:/pb_data
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:0.39.8
    command: ["--encryptionEnv", "ENCRYPTION"]
    depends_on:
      pocketbase-init:
        condition: service_completed_successfully
    environment:
      ENCRYPTION: ${POCKETBASE_ENCRYPTION:?请设置 PocketBase 数据加密密钥}
      PB_HOST: 0.0.0.0
      PB_PORT: 8090
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    volumes:
      - drawnixstore-pocketbase-data:/pb_data
  drawnixstore-bootstrap:
    # 由 GitHub Actions 发布；部署主机不需要拉取源码或本地构建镜像。
    image: ${DRAWNIX_STORE_IMAGE_REPOSITORY:-ghcr.io/nmtuan/drawnixstore}-bootstrap:${DRAWNIX_STORE_IMAGE_TAG:-latest}
    depends_on:
      pocketbase:
        condition: service_healthy
    environment:
      NITRO_POCKETBASE_INTERNAL_URL: http://pocketbase:8090
      NITRO_POCKETBASE_SUPERUSER_EMAIL: ${NITRO_POCKETBASE_SUPERUSER_EMAIL:?请设置 PocketBase 管理员邮箱}
      NITRO_POCKETBASE_SUPERUSER_PASSWORD: ${NITRO_POCKETBASE_SUPERUSER_PASSWORD:?请设置 PocketBase 管理员密码}
      POCKETBASE_SUPERUSER_EMAIL: ${NITRO_POCKETBASE_SUPERUSER_EMAIL:?请设置 PocketBase 管理员邮箱}
      POCKETBASE_SUPERUSER_PASSWORD: ${NITRO_POCKETBASE_SUPERUSER_PASSWORD:?请设置 PocketBase 管理员密码}
  drawnixstore-api:
    image: ${DRAWNIX_STORE_IMAGE_REPOSITORY:-ghcr.io/nmtuan/drawnixstore}-api:${DRAWNIX_STORE_IMAGE_TAG:-latest}
    depends_on:
      drawnixstore-bootstrap:
        condition: service_completed_successfully
    environment:
      NITRO_POCKETBASE_INTERNAL_URL: http://pocketbase:8090
      NITRO_POCKETBASE_SUPERUSER_EMAIL: ${NITRO_POCKETBASE_SUPERUSER_EMAIL:?请设置 PocketBase 管理员邮箱}
      NITRO_POCKETBASE_SUPERUSER_PASSWORD: ${NITRO_POCKETBASE_SUPERUSER_PASSWORD:?请设置 PocketBase 管理员密码}
      NITRO_WEB_ORIGIN: ${DRAWNIX_STORE_PUBLIC_ORIGIN:?请设置 Drawnix Store 公开 HTTPS 地址}
      # 私有部署默认拒绝普通注册；仅在需要多用户自助注册时显式开启。
      NITRO_REGISTRATION_ENABLED: ${DRAWNIX_STORE_REGISTRATION_ENABLED:-false}
      # 仅 API 容器读取的首次初始化令牌，绝不传入 Web 或 bootstrap 容器。
      NITRO_SETUP_TOKEN: ${DRAWNIX_STORE_SETUP_TOKEN:-}
    restart: unless-stopped
  drawnixstore-web:
    image: ${DRAWNIX_STORE_IMAGE_REPOSITORY:-ghcr.io/nmtuan/drawnixstore}-web:${DRAWNIX_STORE_IMAGE_TAG:-latest}
    depends_on:
      drawnixstore-api:
        condition: service_started
    ports:
      - '${DRAWNIX_STORE_WEB_BIND:-0.0.0.0}:${DRAWNIX_STORE_WEB_PORT:-7300}:80'
    restart: unless-stopped
volumes:
  drawnixstore-pocketbase-data:
